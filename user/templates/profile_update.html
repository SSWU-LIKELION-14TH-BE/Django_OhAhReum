<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원정보 수정</title>
</head>
<body>
<h1>회원정보 수정</h1>

{% if messages %}
    {% for message in messages %}
        <p style="color:green;">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}
    
    {{ form.as_p }}

    <button type="submit">수정</button>
</form>

<a href="{% url 'mypage' user.id %}">마이페이지로</a>
<a href="{% url 'home' %}">홈으로</a>
</body>
</html>
