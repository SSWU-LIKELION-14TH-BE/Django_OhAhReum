<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>홈</title>
</head>
<body>
    <h2>홈페이지</h2>
    {% if user.is_authenticated %}
        <p>{{ user.username }}님 환영합니다!</p>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">로그아웃</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}">로그인</a>
    {% endif %}
</body>
</html>
